user  www www;

worker_processes auto;
worker_cpu_affinity auto;

error_log  {web_logs_path}/nginx_error.log  crit;

pid        /usr/local/nginx/logs/nginx.pid;

#Specifies the value for maximum file descriptors that can be opened by this process.
worker_rlimit_nofile 51200;

events
    {
        use epoll;
        worker_connections 51200;
        multi_accept off;
        accept_mutex off;
    }

http
    {
        # include     cloudflare_real_ip.conf;
        include       mime.types;
        default_type  application/octet-stream;

        server_names_hash_bucket_size 128;
        client_header_buffer_size 32k;
        large_client_header_buffers 4 32k;
        client_max_body_size 50m;

        sendfile on;
        sendfile_max_chunk 512k;
        tcp_nopush on;

        keepalive_timeout 60;

        tcp_nodelay on;

        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 64k;
        fastcgi_buffers 4 64k;
        fastcgi_busy_buffers_size 128k;
        fastcgi_temp_file_write_size 256k;

        # --- Gzip 配置 ---
        gzip on;
        gzip_static on;             # 开启静态预压缩检测
        gzip_proxied any;           # 代理请求也开启压缩
        gzip_min_length 1k;         # 小于 1k 的文件不压缩
        gzip_buffers    16 8k;      # 根据机器内存适当调整
        gzip_http_version 1.1;
        gzip_comp_level 5;          # 动态压缩等级(1-9)
        gzip_types
            text/plain text/css
            application/javascript application/x-javascript text/javascript
            application/xml application/xml+rss
            application/json
            image/svg+xml font/woff;
        gzip_vary on;               # 响应头添加 Vary: Accept-Encoding
        gzip_disable   "MSIE [1-6]\.";

        {ngx_http_brotli_module}
        # 指定一个会话的最大同时连接数
        limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
        limit_conn_status 429;
        # 指定一个会话的最大请求数，默认每秒10个请求
        limit_req_zone $binary_remote_addr zone=req_limit:10m rate=10r/s;
        # 针对登录接口的限流，默认每秒1个请求
        limit_req_zone $binary_remote_addr zone=login_limit:10m rate=1r/s;
        limit_req_status 429;

        # 动态判断并设置升级头，如果是websocket则为upgrade，否则为close
        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        # 40x
        error_page 403 =404 /404.html;
        error_page 404 /404.html;

        # lua
        lua_package_path "/usr/local/nginx/lib/lua/?.lua";

        # vts
        # vhost_traffic_status_zone;

        # GeoIP
        # include module/geoip2.conf;

        server_tokens off;
        log_format  main  'IP:$remote_addr{GeoIP2LOG},Time:[$time_iso8601],Request:"$request",Referer:"$http_referer",'
                          'Status:$status,Bytes:$body_bytes_sent,IPChain:"$http_x_forwarded_for",UserAgent:"$http_user_agent",'
                          'RT:[$request_time],UCT:[$upstream_connect_time],UHT:[$upstream_header_time],URT:[$upstream_response_time]';
        access_log  {web_logs_path}/nginx_access.log  main;

server
    {
        listen 80 default_server reuseport;
        #listen [::]:80 default_server ipv6only=on;
        server_name _;
        index index.html index.htm index.php;
        root  {websites_path};

        # Deny access to PHP files in specific directory
        #location ~ /(wp-content|uploads|wp-includes|images)/.*\.php$ { deny all; }

        include 404.conf;

        {ngx_http_vts_module}
        {ngx_http_lua_module}
        include enable-php.conf;

        location /nginx_status
        {
            stub_status on;
            allow 127.0.0.1;
            deny all;
            access_log   off;
        }

        location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
        {
            expires      30d;
        }

        location ~ .*\.(js|css)?$
        {
            expires      12h;
        }

        location ~ /.well-known {
            allow all;
        }

        location ~ /\.
        {
            deny all;
        }

        access_log  {web_logs_path}/nginx_access.log  main;
    }
include vhost/*.conf;
include blacklist.conf;
}

